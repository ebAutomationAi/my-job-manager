<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>my-job-manager</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; }

    header {
      background: white;
      border-bottom: 1px solid #ddd;
      padding: 12px 20px;
      height: 50px;
      display: flex;
      align-items: center;
    }
    header h1 { font-size: 18px; font-weight: 600; }

    .container {
      display: flex;
      height: calc(100vh - 50px);
    }

    /* LEFT SIDEBAR — 220px fixed */
    .sidebar {
      width: 220px;
      background: white;
      border-right: 1px solid #ddd;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .sidebar-section {
      padding: 14px;
      border-bottom: 1px solid #eee;
    }

    .section-title {
      font-size: 11px;
      font-weight: 700;
      color: #666;
      text-transform: uppercase;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }

    .filters-bar > div {
      margin-bottom: 10px;
    }

    .filters-bar label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #666;
      margin-bottom: 4px;
    }

    .filters-bar select,
    .filters-bar input {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #ddd;
      border-radius: 3px;
      font-size: 12px;
    }

    .groq-input-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .groq-input-group input {
      padding: 6px 8px;
      border: 1px solid #ddd;
      border-radius: 3px;
      font-size: 11px;
      font-family: monospace;
      letter-spacing: 0.05em;
    }

    .groq-input-group button {
      padding: 6px 12px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .groq-input-group button:hover { background: #0056b3; }

    .groq-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ccc;
    }

    .groq-dot.active { background: #28a745; }

    .bulk-enrich-btn {
      width: 100%;
      padding: 8px;
      background: #ffc107;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      display: none;
    }

    .bulk-enrich-btn.active { display: block; }
    .bulk-enrich-btn:hover { background: #e0a800; }
    .bulk-enrich-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .progress-text {
      font-size: 10px;
      color: #666;
      margin-top: 6px;
    }

    .stats-box {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      font-size: 11px;
    }

    .stat {
      background: #f9f9f9;
      padding: 8px;
      border-radius: 3px;
      text-align: center;
    }

    .stat-value { font-size: 16px; font-weight: 700; color: #007bff; }
    .stat-label { color: #666; margin-top: 2px; }

    /* MAIN CONTENT AREA */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .offers-container {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    /* ETT GROUP */
    .ett-group {
      background: white;
      border: 1px solid #ddd;
      border-radius: 4px;
      margin-bottom: 10px;
      overflow: hidden;
    }

    .ett-header {
      position: sticky;
      top: 0;
      background: #f8f8f8;
      padding: 10px 12px;
      border-bottom: 1px solid #ddd;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 600;
      font-size: 13px;
      user-select: none;
      z-index: 10;
    }

    .ett-header:hover { background: #f0f0f0; }
    .ett-header.collapsed + .ett-offers { display: none; }

    .ett-name { flex: 1; }
    .ett-counts {
      font-size: 11px;
      color: #666;
      font-weight: normal;
    }

    /* OFFER ROW */
    .offer-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-bottom: 1px solid #eee;
      border-left: 3px solid #ddd;
      transition: background 0.15s;
      font-size: 12px;
    }

    .offer-row:hover {
      background: #f9f9f9;
    }

    .offer-row.pending { border-left-color: #999; }
    .offer-row.interesante { border-left-color: #28a745; }
    .offer-row.descartada { border-left-color: #dc3545; }
    .offer-row.aplicada { border-left-color: #0056b3; }

    /* COLUMNS IN OFFER ROW */
    .col-ett {
      width: 60px;
      flex-shrink: 0;
    }

    .ett-badge {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 10px;
      font-weight: 600;
      color: white;
      text-align: center;
    }

    .ett-badge.adecco { background: #0066cc; }
    .ett-badge.infojobs { background: #ff9900; }
    .ett-badge.manpower { background: #cc0000; }
    .ett-badge.other { background: #666; }

    .col-date {
      width: 40px;
      flex-shrink: 0;
      text-align: center;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      color: #666;
    }

    .col-title {
      flex: 1;
      min-width: 200px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .col-score {
      width: 35px;
      flex-shrink: 0;
      text-align: center;
    }

    .score-badge {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 3px;
      font-weight: 600;
      font-size: 10px;
    }

    .score-badge.high { background: #d4edda; color: #155724; }
    .score-badge.medium { background: #fff3cd; color: #856404; }
    .score-badge.low { background: #f8d7da; color: #721c24; }
    .score-badge.none { background: #e2e3e5; color: #383d41; }

    .col-profile,
    .col-modality,
    .col-salary {
      font-size: 10px;
      flex-shrink: 0;
      max-width: 65px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .tag {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 3px;
      background: #e7e7e7;
      color: #333;
      font-size: 9px;
    }

    .col-actions {
      display: flex;
      gap: 4px;
      opacity: 0;
      transition: opacity 0.15s;
      flex-shrink: 0;
    }

    .offer-row:hover .col-actions {
      opacity: 1;
    }

    .action-btn {
      padding: 4px 8px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      font-size: 11px;
      white-space: nowrap;
      transition: background 0.15s;
    }

    .action-btn:hover { background: #0056b3; }

    .action-btn.open { background: #17a2b8; }
    .action-btn.open:hover { background: #138496; }

    .action-btn.yes { background: #28a745; }
    .action-btn.yes:hover { background: #218838; }

    .action-btn.no { background: #dc3545; }
    .action-btn.no:hover { background: #c82333; }

    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #28a745;
      color: white;
      padding: 12px 16px;
      border-radius: 4px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      font-size: 13px;
      z-index: 1000;
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    @keyframes slideOut {
      from {
        transform: translateX(0);
        opacity: 1;
      }
      to {
        transform: translateX(100%);
        opacity: 0;
      }
    }

    .toast.fade {
      animation: slideOut 0.3s ease-out forwards;
    }

    /* RESPONSIVE: Hide columns on smaller screens */
    @media (max-width: 1200px) {
      .col-salary { display: none; }
    }

    @media (max-width: 1000px) {
      .col-modality { display: none; }
    }
  </style>
</head>
<body>
  <header>
    <h1>📋 my-job-manager</h1>
  </header>

  <div class="container">
    <!-- LEFT SIDEBAR -->
    <div class="sidebar">
      <!-- Filters -->
      <div class="sidebar-section filters-bar">
        <div class="section-title">Filtros</div>
        <div>
          <label>Estado</label>
          <select id="statusFilter" onchange="applyFilters()">
            <option value="">Todos</option>
            <option value="pending">Pendiente</option>
            <option value="interesante">Interesante</option>
            <option value="descartada">Descartada</option>
            <option value="aplicada">Aplicada</option>
          </select>
        </div>
        <div>
          <label>Perfil</label>
          <select id="profileFilter" onchange="applyFilters()">
            <option value="">Todos</option>
            <option value="RCP">RCP</option>
            <option value="ECB">ECB</option>
          </select>
        </div>
        <div>
          <label>Búsqueda</label>
          <input type="text" id="searchFilter" placeholder="Título..." onchange="applyFilters()">
        </div>
        <div>
          <label>Score mínimo</label>
          <select id="scoreFilter" onchange="applyFilters()">
            <option value="">Todos</option>
            <option value="7">≥ 7 (bueno)</option>
            <option value="5">≥ 5 (parcial)</option>
            <option value="3">≥ 3 (bajo)</option>
          </select>
        </div>
      </div>

      <!-- Stats -->
      <div class="sidebar-section">
        <div class="section-title">Estadísticas</div>
        <div class="stats-box">
          <div class="stat">
            <div class="stat-value" id="totalCount">0</div>
            <div class="stat-label">Total</div>
          </div>
          <div class="stat">
            <div class="stat-value" id="pendingCount">0</div>
            <div class="stat-label">Pendientes</div>
          </div>
          <div class="stat">
            <div class="stat-value" id="reviewedCount">0</div>
            <div class="stat-label">Revisados</div>
          </div>
          <div class="stat">
            <div class="stat-value" id="unenrichedStat">0</div>
            <div class="stat-label">Sin IA</div>
          </div>
        </div>
      </div>

      <!-- Groq Key -->
      <div class="sidebar-section">
        <div class="section-title">Groq API</div>
        <div class="groq-input-group">
          <input type="text" id="groqKeyInput" placeholder="API Key" autocomplete="off">
          <button onclick="saveGroqKey()">
            Guardar
            <span class="groq-dot" id="groqDot"></span>
          </button>
        </div>
      </div>

      <!-- Bulk Enrich -->
      <div class="sidebar-section">
        <button class="bulk-enrich-btn" id="bulkEnrichBtn" onclick="startBulkEnrichment()">
          ⚡ Enriquecer <span id="unenrichedCount">0</span>
        </button>
        <div class="progress-text" id="progressText" style="display: none;"></div>
      </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">
      <div class="offers-container" id="offersContainer"></div>
    </div>
  </div>

  <script>
    let enrichmentInProgress = false;

    function getGroqKey() {
      return localStorage.getItem('groq_key') || '';
    }

    function saveGroqKey() {
      const key = document.getElementById('groqKeyInput').value.trim();
      if (key) {
        localStorage.setItem('groq_key', key);
        updateGroqDot();
        document.getElementById('groqKeyInput').value = '';
        loadStats();
      }
    }

    function updateGroqDot() {
      const dot = document.getElementById('groqDot');
      const hasKey = !!getGroqKey();
      dot.classList.toggle('active', hasKey);
      document.getElementById('bulkEnrichBtn').classList.toggle('active', hasKey);
    }

    async function loadStats() {
      const res = await fetch('/api/stats');
      const stats = await res.json();
      document.getElementById('totalCount').textContent = stats.total;
      document.getElementById('unenrichedStat').textContent = stats.unenriched;
      document.getElementById('unenrichedCount').textContent = stats.unenriched;
      document.getElementById('pendingCount').textContent = stats.pending;
      document.getElementById('reviewedCount').textContent = stats.reviewed;
    }

    function formatDate(dateStr) {
      if (!dateStr) return '—';
      const d = new Date(dateStr + 'T00:00:00Z');
      const day = String(d.getUTCDate()).padStart(2, '0');
      const month = String(d.getUTCMonth() + 1).padStart(2, '0');
      return `${day}/${month}`;
    }

    function getScoreBadgeClass(score) {
      if (score === null || score === undefined) return 'none';
      if (score >= 8) return 'high';
      if (score >= 5) return 'medium';
      return 'low';
    }

    function getEttBadgeClass(ettName) {
      const name = (ettName || '').toLowerCase();
      if (name.includes('adecco')) return 'adecco';
      if (name.includes('infojobs')) return 'infojobs';
      if (name.includes('manpower')) return 'manpower';
      return 'other';
    }

    function sortGroupsByCount(groups) {
      const orderMap = { 'adecco': 0, 'infojobs': 1, 'manpower': 2 };
      return groups.sort((a, b) => {
        const aOrder = orderMap[a.ett_name.toLowerCase()] ?? 999;
        const bOrder = orderMap[b.ett_name.toLowerCase()] ?? 999;
        if (aOrder !== bOrder) return aOrder - bOrder;
        return b.count - a.count;
      });
    }

    async function openOffer(url, ettName, offerId) {
      await fetch('/api/open-url', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url, ett_name: ettName })
      });
      showToast('¡Abierto en navegador con sesión guardada!');
    }

    function showToast(message, duration = 8000) {
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = message;
      document.body.appendChild(toast);

      setTimeout(() => {
        toast.classList.add('fade');
        setTimeout(() => toast.remove(), 300);
      }, duration);
    }

    async function updateOfferStatus(id, status) {
      const res = await fetch(`/api/offers/${id}/status`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status })
      });
      if (res.ok) {
        await loadStats();
        await loadOffers();
      }
    }

    async function loadOffers() {
      const status = document.getElementById('statusFilter').value || undefined;
      const profile = document.getElementById('profileFilter').value || undefined;
      const search = document.getElementById('searchFilter').value || undefined;
      const score = document.getElementById('scoreFilter').value || undefined;

      const params = new URLSearchParams({
        ...(status && { status }),
        ...(profile && { profile }),
        ...(search && { search }),
        ...(score && { min_score: score })
      });

      const res = await fetch(`/api/offers/grouped?${params}`);
      const groups = await res.json();

      const sortedGroups = sortGroupsByCount(groups);
      const container = document.getElementById('offersContainer');
      container.innerHTML = '';

      sortedGroups.forEach(group => {
        const groupDiv = document.createElement('div');
        groupDiv.className = 'ett-group';

        const headerDiv = document.createElement('div');
        headerDiv.className = 'ett-header';
        headerDiv.innerHTML = `
          <span class="ett-name">${group.ett_name}</span>
          <span class="ett-counts">${group.count} (${group.pending_count} pend.)</span>
        `;

        headerDiv.onclick = () => {
          headerDiv.classList.toggle('collapsed');
        };

        const offersDiv = document.createElement('div');
        offersDiv.className = 'ett-offers';

        group.offers.forEach(offer => {
          const rowDiv = document.createElement('div');
          rowDiv.className = `offer-row ${offer.status || 'pending'}`;

          const scoreClass = getScoreBadgeClass(offer.ai_score);
          const scoreBadge = offer.ai_score !== null ? `<div class="score-badge ${scoreClass}">${offer.ai_score}</div>` : '<div class="score-badge none">—</div>';

          const profileTag = offer.ai_profile ? offer.ai_profile : '—';
          const modalityTag = offer.ai_modality ? offer.ai_modality : '—';
          const salaryText = offer.ai_salary ? offer.ai_salary.substring(0, 15) : '—';

          rowDiv.innerHTML = `
            <div class="col-ett">
              <div class="ett-badge ${getEttBadgeClass(offer.ett_name)}">${offer.ett_name.substring(0, 8)}</div>
            </div>
            <div class="col-date">${formatDate(offer.published_at)}</div>
            <div class="col-title" title="${offer.title}">${offer.title}</div>
            <div class="col-score">${scoreBadge}</div>
            <div class="col-profile"><span class="tag">${profileTag}</span></div>
            <div class="col-modality"><span class="tag">${modalityTag}</span></div>
            <div class="col-salary"><span style="color: #999;">${salaryText}</span></div>
            <div class="col-actions">
              <button class="action-btn open" onclick="openOffer('${offer.url}', '${offer.ett_name}', ${offer.id})">🔗</button>
              <button class="action-btn yes" onclick="updateOfferStatus(${offer.id}, 'interesante')">✅</button>
              <button class="action-btn no" onclick="updateOfferStatus(${offer.id}, 'descartada')">❌</button>
            </div>
          `;

          offersDiv.appendChild(rowDiv);
        });

        groupDiv.appendChild(headerDiv);
        groupDiv.appendChild(offersDiv);
        container.appendChild(groupDiv);
      });
    }

    function applyFilters() {
      loadOffers();
    }

    async function analyzeOffer(id) {
      const key = getGroqKey();
      if (!key) {
        alert('Configure su Groq key primero');
        return;
      }

      const btn = event.target;
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Analizando...';

      try {
        const res = await fetch(`/api/enrich/${id}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ groq_key: key })
        });

        if (res.ok) {
          await loadStats();
          await loadOffers();
          showToast('✅ Oferta enriquecida');
        } else {
          const error = await res.json();
          alert(`Error: ${error.error}`);
        }
      } catch (err) {
        alert(`Error: ${err.message}`);
      } finally {
        btn.disabled = false;
        btn.innerHTML = '🔍 Analizar con Groq';
      }
    }

    async function startBulkEnrichment() {
      const key = getGroqKey();
      if (!key) {
        alert('Configure su Groq key primero');
        return;
      }

      if (enrichmentInProgress) return;
      enrichmentInProgress = true;

      const res = await fetch('/api/unenriched');
      const offers = await res.json();

      if (offers.length === 0) {
        alert('No hay ofertas sin enriquecer');
        enrichmentInProgress = false;
        return;
      }

      const progress = document.getElementById('progressText');
      progress.style.display = 'block';

      for (let i = 0; i < offers.length; i++) {
        if (!enrichmentInProgress) break;

        progress.textContent = `⚡ ${i + 1}/${offers.length} · Procesando...`;

        const enrichRes = await fetch(`/api/enrich/${offers[i].id}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ groq_key: key })
        });

        let enrichData = null;
        if (enrichRes.ok) {
          enrichData = await enrichRes.json().catch(() => null);
        } else {
          const err = await enrichRes.json().catch(() => ({}));
          console.error(`Error offer ${offers[i].id}:`, err.error || 'unknown');
        }

        // Real-time DOM removal: hide rows with score < 7 immediately
        if (enrichData && enrichData.ai && Number(enrichData.ai.score) < 7) {
          const allRows = document.querySelectorAll('.offer-row');
          allRows.forEach(row => {
            const scoreBadge = row.querySelector('.score-badge');
            if (scoreBadge) {
              const rowScore = parseInt(scoreBadge.textContent, 10);
              if (!isNaN(rowScore) && rowScore < 7) {
                row.style.transition = 'opacity 0.3s';
                row.style.opacity = '0';
                setTimeout(() => row.remove(), 300);
              }
            }
          });
        }

        if (i < offers.length - 1) {
          await new Promise(resolve => setTimeout(resolve, 2100));
        }
      }

      enrichmentInProgress = false;
      progress.style.display = 'none';
      await loadStats();
      await loadOffers();
      document.getElementById('scoreFilter').value = '';
      showToast(`✅ ${offers.length} ofertas enriquecidas`);
    }

    window.addEventListener('load', () => {
      updateGroqDot();
      loadStats();
      loadOffers();
    });
  </script>
</body>
</html>
